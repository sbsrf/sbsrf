name: Release (macOS)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '测试原因（选填）'
        required: false
        default: 'Manual test run on macOS'
      ref:
        description: '要构建的 Git ref（分支/Tag/commit，留空使用默认分支）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-on-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: zsh {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install missing dependencies
        run: |
          if [[ $(uname -m) == "arm64" ]]; then
              HOMEBREW_PATH="/opt/homebrew"
          else
              HOMEBREW_PATH="/usr/local"
          fi
          echo "HOMEBREW_PATH=$HOMEBREW_PATH" >> $GITHUB_ENV
          LIBRIME_PATH="$PWD/librime"
          echo "LIBRIME_PATH=$LIBRIME_PATH" >> $GITHUB_ENV

          if [[ ! -f "$HOMEBREW_PATH/bin/brew" ]]; then
              /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          "$HOMEBREW_PATH/bin/brew" install boost

      - name: Get latest librime release
        id: get_librime
        run: |
          LATEST_RELEASE=$(curl -s "https://api.github.com/repos/rime/librime/releases/latest" | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
          echo "latest_release=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          ASSETS=$(curl -s "https://api.github.com/repos/rime/librime/releases/tags/$LATEST_RELEASE" | grep -o '"browser_download_url": "[^"]*macOS-universal[^"]*"' | cut -d'"' -f4)
          echo "download_url=$ASSETS" >> $GITHUB_OUTPUT
          echo "Found latest librime: $LATEST_RELEASE"
          echo "Download URL: $ASSETS"

      - name: Download and extract librime
        run: |
          LIBRIME_URL="${{ steps.get_librime.outputs.download_url }}"
          LIBRIME_ARCHIVE="librime/rime.tar.bz2"
          
          mkdir -p "${{ env.LIBRIME_PATH }}"
          curl -L -o "$LIBRIME_ARCHIVE" "$LIBRIME_URL" || { echo "Download failed"; exit 1; }
          tar -xjf "$LIBRIME_ARCHIVE" -C "${{ env.LIBRIME_PATH }}/" --strip-components=2 || { echo "Extract failed"; exit 1; }
          
          if [[ ! -f "${{ env.LIBRIME_PATH }}/librime.1.dylib" || ! -f "${{ env.LIBRIME_PATH }}/rime_deployer" ]]; then
              echo "Core files missing"
              ls -la "${{ env.LIBRIME_PATH }}"
              exit 1
          fi
          echo "Librime extracted successfully (version: ${{ steps.get_librime.outputs.latest_release }})"

      - name: Fix dynamic library paths
        run: |
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          RIME_DEPLOYER="$LIBRIME_PATH/rime_deployer"
          LIBRIME_DYLIB="$LIBRIME_PATH/librime.1.dylib"

          install_name_tool -change "@rpath/librime.1.dylib" "$LIBRIME_DYLIB" "$RIME_DEPLOYER"
          
          SYSTEM_ICONV="/usr/lib/libiconv.2.dylib"
          if otool -L "$LIBRIME_DYLIB" | grep -q "@rpath/libiconv"; then
              install_name_tool -change "@rpath/libiconv.2.dylib" "$SYSTEM_ICONV" "$LIBRIME_DYLIB"
          fi
          
          BOOST_LIB="$HOMEBREW_PATH/lib/libboost_regex-mt.dylib"
          if otool -L "$LIBRIME_DYLIB" | grep -q "@rpath/libboost"; then
              install_name_tool -change "@rpath/libboost_regex-mt.dylib" "$BOOST_LIB" "$LIBRIME_DYLIB"
          fi
          echo "Dynamic library paths fixed"

      - name: Verify dynamic library loading
        run: |
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          
          export DYLD_LIBRARY_PATH="$LIBRIME_PATH:$HOMEBREW_PATH/lib:/usr/lib"
          export PATH="$LIBRIME_PATH:$PATH"

          echo "Testing dynamic library loading..."
          set +e
          "$LIBRIME_PATH/rime_deployer" 2>&1 | tee load_test.log
          LOAD_EXIT_CODE=$?
          set -e

          if grep -q "dyld:" load_test.log || grep -q "Library not loaded" load_test.log; then
              echo "Dynamic library loading failed"
              cat load_test.log
              exit 1
          else
              echo "Dynamic library loading successful"
          fi

      - name: Build project
        run: |
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          
          export DYLD_LIBRARY_PATH="$LIBRIME_PATH:$HOMEBREW_PATH/lib:/usr/lib"
          export PATH="$LIBRIME_PATH:$PATH"

          echo "Moving sbxlm config files..."
          if [[ -d "sbxlm" ]]; then
              mv -f sbxlm/* .
              mv -f trime/default.yaml .
              echo "sbxlm files moved"
          else
              echo "sbxlm directory not found, skipping"
          fi

          RIME_TARGET="$PWD/tmp_rime"
          mkdir -p "$RIME_TARGET"

          echo "Running rime_deployer --build..."
          rime_deployer --build . "$RIME_TARGET" 2>&1 | tee build.log
          if [[ $? -ne 0 ]]; then
              echo "Build failed"
              cat build.log
              exit 1
          fi
          echo "Project built successfully"

      - name: Clean up and package
        id: package
        run: |
          LIBRIME_VERSION="${{ steps.get_librime.outputs.latest_release }}"
          PACKAGE_NAME="sbsrf4librime${LIBRIME_VERSION}.zip"
          
          rm -rf bihua* zhlf* sbfc* *.extended.dict.yaml *2.schema.yaml user.yaml sbpy.base.dict.yaml sbpy.ext.dict.yaml sbpy.tencent.dict.yaml 2>/dev/null
          
          zip -q -r "$PACKAGE_NAME" build lua opencc *.yaml *.txt 2>/dev/null
          if [[ -f "$PACKAGE_NAME" ]]; then
              echo "Package created successfully: $(du -h $PACKAGE_NAME)"
              echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
              echo "package_exists=true" >> $GITHUB_OUTPUT
          else
              echo "Package not created"
              echo "package_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact for manual run
        if: steps.package.outputs.package_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: ${{ steps.package.outputs.package_name }}
          retention-days: 7
