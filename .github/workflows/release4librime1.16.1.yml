name: Release (macOS)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '测试原因（选填）'
        required: false
        default: 'Manual test run on macOS'
      ref:
        description: '要构建的 Git ref（分支/Tag/commit，留空使用默认分支）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-on-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: zsh {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install missing dependencies
        run: |
          # 自动适配 Apple Silicon/Intel 架构
          if [[ $(uname -m) == "arm64" ]]; then
              HOMEBREW_PATH="/opt/homebrew"
          else
              HOMEBREW_PATH="/usr/local"
          fi
          echo "HOMEBREW_PATH=$HOMEBREW_PATH" >> $GITHUB_ENV
          LIBRIME_PATH="$PWD/librime"
          echo "LIBRIME_PATH=$LIBRIME_PATH" >> $GITHUB_ENV

          # 安装 Homebrew 及 boost 依赖
          if [[ ! -f "$HOMEBREW_PATH/bin/brew" ]]; then
              /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          "$HOMEBREW_PATH/bin/brew" install boost

      - name: Download and extract librime
        run: |
          LIBRIME_URL="https://github.com/rime/librime/releases/download/1.16.1/rime-de4700e-macOS-universal.tar.bz2"
          LIBRIME_ARCHIVE="librime/rime.tar.bz2"
          
          mkdir -p "${{ env.LIBRIME_PATH }}"
          curl -L -o "$LIBRIME_ARCHIVE" "$LIBRIME_URL" || { echo "❌ 下载 librime 失败"; exit 1; }
          tar -xjf "$LIBRIME_ARCHIVE" -C "${{ env.LIBRIME_PATH }}/" --strip-components=2 || { echo "❌ 解压 librime 失败"; exit 1; }
          
          # 验证核心文件存在
          if [[ ! -f "${{ env.LIBRIME_PATH }}/librime.1.dylib" || ! -f "${{ env.LIBRIME_PATH }}/rime_deployer" ]]; then
              echo "❌ librime 核心文件缺失"
              ls -la "${{ env.LIBRIME_PATH }}"
              exit 1
          fi
          echo "✅ librime 解压成功"

      - name: Fix dynamic library paths
        run: |
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          RIME_DEPLOYER="$LIBRIME_PATH/rime_deployer"
          LIBRIME_DYLIB="$LIBRIME_PATH/librime.1.dylib"

          # 修复 rime_deployer 对 librime 的引用
          install_name_tool -change "@rpath/librime.1.dylib" "$LIBRIME_DYLIB" "$RIME_DEPLOYER"
          
          # 修复 librime 依赖的系统库
          SYSTEM_ICONV="/usr/lib/libiconv.2.dylib"
          if otool -L "$LIBRIME_DYLIB" | grep -q "@rpath/libiconv"; then
              install_name_tool -change "@rpath/libiconv.2.dylib" "$SYSTEM_ICONV" "$LIBRIME_DYLIB"
          fi
          
          # 修复 boost 依赖
          BOOST_LIB="$HOMEBREW_PATH/lib/libboost_regex-mt.dylib"
          if otool -L "$LIBRIME_DYLIB" | grep -q "@rpath/libboost"; then
              install_name_tool -change "@rpath/libboost_regex-mt.dylib" "$BOOST_LIB" "$LIBRIME_DYLIB"
          fi
          echo "✅ 动态库路径修复完成"

      - name: Verify dynamic library loading
        run: |
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          
          # 配置动态库路径
          export DYLD_LIBRARY_PATH="$LIBRIME_PATH:$HOMEBREW_PATH/lib:/usr/lib"
          export PATH="$LIBRIME_PATH:$PATH"

          # 正确的测试方式：执行 rime_deployer 无参数（不报错=加载成功）
          echo "📋 测试动态库加载（执行 rime_deployer 无参数）..."
          set +e  # 临时关闭错误中断
          "$LIBRIME_PATH/rime_deployer" 2>&1 | tee load_test.log
          LOAD_EXIT_CODE=$?
          set -e

          # 判断是否为动态库加载失败（关键：区分动态库错误和参数错误）
          if grep -q "dyld:" load_test.log || grep -q "Library not loaded" load_test.log; then
              echo "❌ 动态库加载失败！详细日志："
              cat load_test.log
              exit 1
          else
              echo "✅ 动态库加载成功（rime_deployer 无参数返回参数错误，属于正常现象）"
          fi

      - name: Build project
        run: |
          LIBRIME_PATH="${{ env.LIBRIME_PATH }}"
          HOMEBREW_PATH="${{ env.HOMEBREW_PATH }}"
          
          # 配置环境变量
          export DYLD_LIBRARY_PATH="$LIBRIME_PATH:$HOMEBREW_PATH/lib:/usr/lib"
          export PATH="$LIBRIME_PATH:$PATH"

          # 移动 sbxlm 目录文件（构建必需）
          echo "🔄 移动 sbxlm 配置文件..."
          if [[ -d "sbxlm" ]]; then
              mv -f sbxlm/* .
              mv -f trime/default.yaml .
              echo "✅ sbxlm 文件移动完成"
          else
              echo "⚠️ sbxlm 目录不存在，跳过移动"
          fi

          # 创建构建目标目录
          RIME_TARGET="$PWD/tmp_rime"
          mkdir -p "$RIME_TARGET"

          # 执行 Rime 构建（核心命令）
          echo "🔨 执行 rime_deployer --build..."
          rime_deployer --build . "$RIME_TARGET" 2>&1 | tee build.log
          if [[ $? -ne 0 ]]; then
              echo "❌ 构建失败！详细日志："
              cat build.log
              exit 1
          fi
          echo "✅ 项目构建成功！"

      - name: Clean up and package
        run: |
          # 清理冗余文件
          rm -rf bihua* zhlf* sbfc* *.extended.dict.yaml *2.schema.yaml user.yaml sbpy.base.dict.yaml sbpy.ext.dict.yaml sbpy.tencent.dict.yaml 2>/dev/null
          
          # 打包构建产物
          zip -q -r sbsrf4librime1.16.1.zip build lua opencc *.yaml *.txt 2>/dev/null
          if [[ -f "sbsrf4librime1.16.1.zip" ]]; then
              echo "✅ 打包成功！文件大小：$(du -h sbsrf4librime1.16.1.zip | awk '{print $1}')"
              # 上传产物到 GitHub Actions 工件（手动触发时也能下载）
              echo "::set-output name=package_exists::true"
          else
              echo "⚠️ 未生成 sbsrf4librime1.16.1.zip（无匹配文件）"
              echo "::set-output name=package_exists::false"
          fi
        id: package_step  # 标记步骤，用于后续判断

      # 手动触发时：上传到 GitHub Actions 工件（可手动下载）
      - name: Upload artifact for manual run
        if: steps.package_step.outputs.package_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sbsrf4librime1.16.1
          path: sbsrf4librime1.16.1.zip
          retention-days: 7  # 工件保留7天
